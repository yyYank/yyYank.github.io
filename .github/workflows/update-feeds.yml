name: Update Feeds Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Master
        uses: actions/checkout@v5
        with:
          path: repo

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: repo/package-lock.json

      - name: Checkout Snapshot Branch
        uses: actions/checkout@v5
        with:
          ref: feeds-snapshot
          path: snapshot
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            public/feeds-data.json

      - name: Install dependencies
        run: npm ci
        working-directory: repo

      - name: Refresh feeds snapshot
        run: npm run fetch:feeds
        working-directory: repo

      - name: Copy snapshot artifact
        run: |
          mkdir -p snapshot/public
          cp repo/public/feeds-data.json snapshot/public/feeds-data.json

      - name: Commit snapshot
        working-directory: snapshot
        run: |
          if git diff --quiet -- public/feeds-data.json; then
            echo "No snapshot changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/feeds-data.json
          git commit -m "Update feeds snapshot"
          git push origin HEAD:feeds-snapshot
